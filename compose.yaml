services:
  app:
    build:
      context: .
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    image: pos-perpusums-app
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "${APP_PORT:-8000}:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000 --no-reload
    environment:
      WWWUSER: ${WWWUSER:-1000}
      WWWGROUP: ${WWWGROUP:-1000}
    volumes:
      - .:/var/www/html
      - app-vendor:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - pos-perpusums

  vite:
    image: node:24-alpine
    working_dir: /var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/var/www/html
      - vite-node-modules:/var/www/html/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - app
    networks:
      - pos-perpusums

  mysql:
    image: mysql:8.4
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-pos_perpusums}
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos-perpusums

  redis:
    image: redis:8-alpine
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - pos-perpusums

networks:
  pos-perpusums:
    driver: bridge

volumes:
  app-vendor:
  vite-node-modules:
  mysql-data:
  redis-data:
